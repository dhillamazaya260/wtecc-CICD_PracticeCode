---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: cleanup
spec:
  workspaces:
    - name: source
      description: The workspace to clean up
  steps:
    - name: remove
      image: alpine:3
      command: ["/bin/sh", "-c"]
      args:
        - |
          echo "=== Cleaning workspace ==="
          rm -rf /workspace/source/*
          rm -rf /workspace/source/.[!.]*
          echo "=== Cleanup complete ==="
---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: jest-test
spec:
  workspaces:
    - name: source
      description: The workspace containing the source code
  params:
    - name: repo-url
      type: string
      default: ""
  steps:
    - name: run-jest-tests
      image: node:18-alpine
      workingDir: /workspace/source
      command: ["/bin/sh", "-c"]
      args:
        - |
          echo "=== Installing dependencies ==="
          npm install
          echo "=== Running ESLint ==="
          npm run lint
          echo "=== Running Jest unit tests ==="
          npm test
          echo "=== Tests complete ==="
